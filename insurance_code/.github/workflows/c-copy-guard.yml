name: C Copy Guard

on:
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/check-hardcoded-copy.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/check-v1-contract-freeze.mjs'
      - '.github/workflows/c-copy-guard.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'scripts/check-hardcoded-copy.mjs'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/check-v1-contract-freeze.mjs'
      - '.github/workflows/c-copy-guard.yml'

jobs:
  c-copy-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Contract freeze check
        run: npm run contracts:freeze:check

      - name: Copy guard + lint + build
        run: npm run ci:c
