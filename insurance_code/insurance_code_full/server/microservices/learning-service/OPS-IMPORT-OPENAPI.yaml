openapi: 3.0.3
info:
  title: P Learning Ops Import API
  version: 1.0.0
  description: >
    P 端知识学习运营导入接口契约。该契约面向运营系统与第三方导入方，
    仅覆盖 x-ops-api-key 直连模式下的单条导入与批量导入能力。
servers:
  - url: http://127.0.0.1:4100
    description: Local gateway entry
  - url: http://127.0.0.1:4000
    description: Local api-v1 direct entry
tags:
  - name: Ops Import
    description: 运营系统导入 P 端学习资料
paths:
  /api/p/learning/courses:
    post:
      tags:
        - Ops Import
      summary: 导入单条学习资料
      description: >
        创建一条学习资料。支持直接传 media，也支持通过 uploadItems[].dataUrl
        内联上传文件。相同 idempotencyKey 重试时会返回第一次创建结果，并返回
        idempotent=true。
      operationId: createPLearningCourse
      security:
        - OpsApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearningCourseRequest'
            examples:
              article_with_inline_upload:
                summary: 文章资料 + 内联封面图
                value:
                  title: 家庭资产配置课
                  category: 运营导入
                  contentType: article
                  level: 中级
                  content: 课程正文
                  rewardPoints: 12
                  status: published
                  idempotencyKey: ops-learning-001
                  uploadItems:
                    - name: cover.png
                      type: image/png
                      dataUrl: data:image/png;base64,ZmFrZQ==
      responses:
        '200':
          description: 导入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLearningCourseResponse'
              examples:
                created:
                  summary: 首次创建
                  value:
                    ok: true
                    course:
                      id: 101
                      tenantId: 1
                      title: 家庭资产配置课
                      category: 运营导入
                      rewardPoints: 12
                      points: 12
                      contentType: article
                      status: published
                      level: 中级
                      content: 课程正文
                      coverUrl: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                      image: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                      media:
                        - name: cover.png
                          type: image/png
                          preview: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                          url: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                          path: /uploads/tenant_1/20260318/cover.png
                      createdAt: '2026-03-18T06:00:00.000Z'
                      updatedAt: '2026-03-18T06:00:00.000Z'
                    idempotent: false
                replayed:
                  summary: 幂等重放
                  value:
                    ok: true
                    course:
                      id: 101
                      tenantId: 1
                      title: 家庭资产配置课
                      category: 运营导入
                      rewardPoints: 12
                      points: 12
                      contentType: article
                      status: published
                      level: 中级
                      content: 课程正文
                      coverUrl: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                      image: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                      media:
                        - name: cover.png
                          type: image/png
                          preview: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                          url: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover.png
                          path: /uploads/tenant_1/20260318/cover.png
                      createdAt: '2026-03-18T06:00:00.000Z'
                      updatedAt: '2026-03-18T06:00:00.000Z'
                    idempotent: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          $ref: '#/components/responses/FileTooLarge'
  /api/p/learning/courses/batch:
    post:
      tags:
        - Ops Import
      summary: 批量导入学习资料
      description: >
        单批最多 20 条。顶层 idempotencyKey 控制整批幂等。任一条数据非法时整批失败并回滚，
        错误响应会返回 itemIndex 标记失败条目索引。
      operationId: createPLearningCourseBatch
      security:
        - OpsApiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLearningCourseBatchRequest'
            examples:
              batch_import:
                summary: 批量导入两条资料
                value:
                  idempotencyKey: ops-learning-batch-001
                  items:
                    - title: 批量课程 A
                      category: 运营导入
                      contentType: article
                      level: 初级
                      content: 课程正文 A
                      rewardPoints: 10
                      status: published
                      uploadItems:
                        - name: cover-a.png
                          type: image/png
                          dataUrl: data:image/png;base64,ZmFrZQ==
                    - title: 批量课程 B
                      category: 运营导入
                      contentType: article
                      level: 中级
                      content: 课程正文 B
                      rewardPoints: 20
                      status: published
      responses:
        '200':
          description: 整批导入成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLearningCourseBatchResponse'
              examples:
                created:
                  summary: 首次整批创建
                  value:
                    ok: true
                    total: 2
                    createdCount: 2
                    items:
                      - index: 0
                        ok: true
                        idempotent: false
                        course:
                          id: 201
                          tenantId: 1
                          title: 批量课程 A
                          category: 运营导入
                          rewardPoints: 10
                          points: 10
                          contentType: article
                          status: published
                          level: 初级
                          content: 课程正文 A
                          coverUrl: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                          image: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                          media:
                            - name: cover-a.png
                              type: image/png
                              preview: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                              url: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                              path: /uploads/tenant_1/20260318/cover-a.png
                          createdAt: '2026-03-18T06:00:00.000Z'
                          updatedAt: '2026-03-18T06:00:00.000Z'
                      - index: 1
                        ok: true
                        idempotent: false
                        course:
                          id: 202
                          tenantId: 1
                          title: 批量课程 B
                          category: 运营导入
                          rewardPoints: 20
                          points: 20
                          contentType: article
                          status: published
                          level: 中级
                          content: 课程正文 B
                          coverUrl: ''
                          image: ''
                          media: []
                          createdAt: '2026-03-18T06:00:00.000Z'
                          updatedAt: '2026-03-18T06:00:00.000Z'
                    courses:
                      - id: 201
                        tenantId: 1
                        title: 批量课程 A
                        category: 运营导入
                        rewardPoints: 10
                        points: 10
                        contentType: article
                        status: published
                        level: 初级
                        content: 课程正文 A
                        coverUrl: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                        image: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                        media:
                          - name: cover-a.png
                            type: image/png
                            preview: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                            url: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                            path: /uploads/tenant_1/20260318/cover-a.png
                        createdAt: '2026-03-18T06:00:00.000Z'
