components:
  securitySchemes:
    OpsApiKey:
      type: apiKey
      in: header
      name: x-ops-api-key
      description: 运营系统导入专用 API key
  responses:
    BadRequest:
      description: 请求参数错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            title_required:
              summary: 标题不能为空
              value:
                code: COURSE_TITLE_REQUIRED
                message: 资料标题不能为空
            batch_items_required:
              summary: 批量 items 为空
              value:
                code: COURSE_BATCH_ITEMS_REQUIRED
                message: 请至少提交一条学习资料
            batch_limit_exceeded:
              summary: 批量条数超限
              value:
                code: COURSE_BATCH_ITEMS_LIMIT_EXCEEDED
                message: 单次最多导入 20 条学习资料
            invalid_data_url:
              summary: 上传内容格式错误
              value:
                code: INVALID_DATA_URL
                message: 上传内容格式错误
                itemIndex: 0
    Unauthorized:
      description: API key 错误
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: OPS_API_KEY_INVALID
            message: invalid ops api key
    FileTooLarge:
      description: 上传文件过大
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: FILE_TOO_LARGE
            message: 文件过大，单文件最大 12MB
            itemIndex: 0
  schemas:
    UploadItem:
      type: object
      properties:
        name:
          type: string
          description: 原始文件名
        type:
          type: string
          description: MIME 类型
        dataUrl:
          type: string
          description: >
            采用 data:[mime];base64,... 结构的 Data URL。单文件最大 12MB。
      required:
        - name
        - type
        - dataUrl
    MediaItem:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        preview:
          type: string
        url:
          type: string
        path:
          type: string
      required:
        - name
        - type
        - preview
        - url
        - path
    CreateLearningCourseRequest:
      type: object
      properties:
        title:
          type: string
          description: 课程标题，必填
        category:
          type: string
          description: 课程分类，默认 通用培训
        contentType:
          type: string
          description: 内容类型，默认 article
          example: article
        level:
          type: string
          description: 难度分级，默认 中级
          example: 中级
        content:
          type: string
          description: 课程正文
        rewardPoints:
          type: integer
          description: 奖励积分，和 points 二选一即可
        points:
          type: integer
          description: 奖励积分别名，和 rewardPoints 二选一即可
        status:
          type: string
          description: 课程状态，默认 published
          example: published
        idempotencyKey:
          type: string
          description: 幂等键，建议始终传
        coverUrl:
          type: string
          description: 手动指定封面地址；如果省略且传了图片媒体，自动取第一张
        media:
          type: array
          description: 已经上传完成的媒体列表
          maxItems: 6
          items:
            $ref: '#/components/schemas/MediaItem'
        uploadItems:
          type: array
          description: 内联上传文件，服务端会先上传再写课程
          maxItems: 6
          items:
            $ref: '#/components/schemas/UploadItem'
      required:
        - title
    CreateLearningCourseBatchRequest:
      type: object
      properties:
        idempotencyKey:
          type: string
          description: 顶层幂等键，控制整批重放
        items:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: '#/components/schemas/CreateLearningCourseRequest'
      required:
        - items
    LearningCourse:
      type: object
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        title:
          type: string
        category:
          type: string
        rewardPoints:
          type: integer
        points:
          type: integer
        contentType:
          type: string
        status:
          type: string
        level:
          type: string
        content:
          type: string
        sortOrder:
          type: integer
        coverUrl:
          type: string
        image:
          type: string
        media:
          type: array
          items:
            $ref: '#/components/schemas/MediaItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - tenantId
        - title
        - category
        - rewardPoints
        - points
        - contentType
        - status
        - level
        - content
        - coverUrl
        - image
        - media
    CreateLearningCourseResponse:
      type: object
      properties:
        ok:
          type: boolean
        course:
          $ref: '#/components/schemas/LearningCourse'
        idempotent:
          type: boolean
      required:
        - ok
        - course
        - idempotent
    CreateLearningCourseBatchItemResponse:
      type: object
      properties:
        index:
          type: integer
        ok:
          type: boolean
        idempotent:
          type: boolean
        course:
          $ref: '#/components/schemas/LearningCourse'
      required:
        - index
        - ok
        - idempotent
        - course
    CreateLearningCourseBatchResponse:
      type: object
      properties:
        ok:
          type: boolean
        total:
          type: integer
        createdCount:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/CreateLearningCourseBatchItemResponse'
        courses:
          type: array
          items:
            $ref: '#/components/schemas/LearningCourse'
        idempotent:
          type: boolean
      required:
        - ok
        - total
        - createdCount
        - items
        - courses
        - idempotent
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        itemIndex:
          type: integer
          description: 批量导入失败时，定位到失败的 items 索引
      required:
        - code
        - message
