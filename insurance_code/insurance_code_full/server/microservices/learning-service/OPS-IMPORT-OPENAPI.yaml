                        media: []
                        createdAt: '2026-03-18T06:00:00.000Z'
                        updatedAt: '2026-03-18T06:00:00.000Z'
                    idempotent: false
                replayed:
                  summary: 幂等重放整包结果
                  value:
                    ok: true
                    total: 2
                    createdCount: 2
                    items:
                      - index: 0
                        ok: true
                        idempotent: false
                        course:
                          id: 201
                          tenantId: 1
                          title: 批量课程 A
                          category: 运营导入
                          rewardPoints: 10
                          points: 10
                          contentType: article
                          status: published
