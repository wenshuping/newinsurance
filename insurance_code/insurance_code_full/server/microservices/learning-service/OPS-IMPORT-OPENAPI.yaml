                          content: 课程正文 A
                          coverUrl: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                          image: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                          media:
                            - name: cover-a.png
                              type: image/png
                              preview: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                              url: http://127.0.0.1:4100/uploads/tenant_1/20260318/cover-a.png
                              path: /uploads/tenant_1/20260318/cover-a.png
                          createdAt: '2026-03-18T06:00:00.000Z'
