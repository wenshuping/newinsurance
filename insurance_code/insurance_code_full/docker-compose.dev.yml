version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: insurance
      POSTGRES_PASSWORD: insurance
      POSTGRES_DB: insurance_runtime_dev
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "npm run dev:api:skeleton"
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4000
      STORAGE_BACKEND: postgres
      DATABASE_URL: postgresql://insurance:insurance@postgres:5432/insurance_runtime_dev
      PGSSL: disable
      CSRF_PROTECTION: 'true'
      REQUIRE_SENSITIVE_CONFIRM: 'true'
    ports:
      - '4000:4000'
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: sh -c "npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://127.0.0.1:4000
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pgdata:
