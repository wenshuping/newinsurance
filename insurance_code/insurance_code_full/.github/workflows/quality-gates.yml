name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  insurance-code-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci

      - name: Week8 runtime split gate
        env:
          STORAGE_BACKEND: file
        run: npm run ci:gate:week8-runtime-split

      - name: Typecheck (C/API)
        run: npm run typecheck

      - name: Docs link check
        run: npm run docs:check-links

      - name: Tenant fallback risk check
        run: npm run risk:check-tenant-fallback

      - name: Start API skeleton
        env:
          STORAGE_BACKEND: dbjson
        run: |
          npm run dev:api:skeleton > /tmp/p-admin-smoke-api.log 2>&1 &
          echo $! > /tmp/p-admin-smoke-api.pid
          for i in {1..60}; do
            if curl -fsS "http://127.0.0.1:4000/api/health" >/dev/null; then
              echo "API is ready"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to start in time"
          cat /tmp/p-admin-smoke-api.log || true
          exit 1

      - name: Release preflight gate
        env:
          STORAGE_BACKEND: dbjson
          DATABASE_URL: ""
          P_COMPANY_ADMIN_ACCOUNT: ${{ secrets.P_COMPANY_ADMIN_ACCOUNT }}
          P_COMPANY_ADMIN_PASSWORD: ${{ secrets.P_COMPANY_ADMIN_PASSWORD }}
        run: npm run release:preflight

      - name: Upload release preflight reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-preflight-reports
          path: |
            docs/reports/release-preflight-*.json
            docs/reports/release-preflight-*.md
            docs/reports/perf-baseline-*.json
            docs/reports/perf-baseline-*.md
            docs/reports/release-dashboard-*.json
            docs/reports/release-dashboard-*.md
            docs/reports/release-dashboard-latest.json
            docs/reports/release-dashboard-latest.md
            docs/reports/slo-guard-*.json
            docs/reports/slo-guard-*.md
            docs/reports/slo-guard-latest.json
            docs/reports/slo-guard-latest.md
          if-no-files-found: ignore

      - name: Stop API skeleton
        if: always()
        run: |
          if [ -f /tmp/p-admin-smoke-api.pid ]; then
            kill "$(cat /tmp/p-admin-smoke-api.pid)" || true
          fi
          cat /tmp/p-admin-smoke-api.log || true

  insurance-b-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Typecheck (B if present)
        run: |
          if [ -d insurance_code_B ]; then
            cd insurance_code_B
            npm ci
            npm run typecheck
          else
            echo "insurance_code_B not present, skipping."
          fi

  insurance-p-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Typecheck (P if present)
        run: |
          if [ -d insurance_code_P ]; then
            cd insurance_code_P
            npm ci
            npm run typecheck
          else
            echo "insurance_code_P not present, skipping."
          fi
